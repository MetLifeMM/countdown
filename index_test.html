<!DOCTYPE html>

<html lang="es">

 

<head>

<meta charset="utf-8">

<title>Confidence Timer PRO</title>

 

<style>

html,body{

  margin:0;

  width:100%;

  height:100%;

  background:black;

  color:white;

  font-family:Arial;

}

 

/* DEBUG DISPLAY */

#debug{

  position:fixed;

  top:0;

  width:100%;

  text-align:center;

  font-size:30px;

  color:cyan;

  z-index:50;

}

 

/* TIMER */

#screen{

  display:flex;

  justify-content:center;

  align-items:center;

  height:100%;

}

 

#timer{

  font-size:200px;

}

</style>

</head>

 

<body>

 

<div id="debug">Presiona tecla...</div>

 

<div id="screen">

  <div id="timer">00:00</div>

</div>

 

<script>

document.addEventListener("keydown", function(e){

 

  // 🔍 DEBUG: muestra TODO lo que llega

  document.getElementById("debug").innerHTML =

    "key: " + e.key +

    " | code: " + e.code +

    " | keyCode: " + e.keyCode;

 

});

</script>

 

</body>

</html>
