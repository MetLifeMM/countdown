<!DOCTYPE html>

<html lang="es">

 

<head>

<meta charset="utf-8">

<title>Confidence Timer PRO</title>

<meta name="viewport" content="width=1920,height=1080">

 

<style>

html,body{

  margin:0;

  width:100%;

  height:100%;

  overflow:hidden;

  font-family:Arial,Helvetica,sans-serif;

  color:white;

  background:black;

}

 

/* ================= CANCHA ================= */

#field{

  position:fixed;

  bottom:0;

  width:100%;

  height:35%;

  z-index:1;

 

  background:

    repeating-linear-gradient(

      to bottom,

      rgba(0,200,100,0.15) 0px,

      rgba(0,200,100,0.15) 4px,

      rgba(0,120,60,0.15) 4px,

      rgba(0,120,60,0.15) 18px

    ),

    linear-gradient(to top, #003d24 0%, transparent 100%);

}

 

#field::before{

  content:"";

  position:absolute;

  top:20%;

  left:50%;

  transform:translateX(-50%);

  width:2px;

  height:60%;

  background:rgba(255,255,255,0.12);

}

 

#field::after{

  content:"";

  position:absolute;

  top:50%;

  left:50%;

  transform:translate(-50%,-50%);

  width:220px;

  height:220px;

  border:2px solid rgba(255,255,255,0.12);

  border-radius:50%;

}

 

/* ⚽ BALÓN */

#ball{

  position:absolute;

  bottom:25px;

  left:50%;

  width:60px;

  transform:translateX(-50%);

  opacity:0.25;

 

  filter: drop-shadow(0 0 10px rgba(0,255,150,0.6));

 

  animation:moveBall 8s ease-in-out infinite;

}

 

@keyframes moveBall{

  0%{transform:translate(-50%,0);}

  25%{transform:translate(-120%, -10px);}

  50%{transform:translate(0%, -20px);}

  75%{transform:translate(120%, -10px);}

  100%{transform:translate(-50%,0);}

}

 

/* ================= LOGO ================= */

#logo{

  position:fixed;

  top:15px;

  left:40px;

  width:340px;

  opacity:0.75;

  z-index:10;

}

 

/* ================= BRAND ================= */

#brandBlock{

  position:fixed;

  bottom:15px;

  right:60px;

  text-align:right;

  opacity:0.5;

  z-index:10;

}

 

#poweredMini{

  font-size:16px;

  letter-spacing:2px;

  opacity:0.5;

  color:#aaaaaa;

  margin-bottom:4px;

}

 

#brandTop{

  font-size:34px;

  font-weight:600;

}

 

#brandBottom{

  font-size:30px;

}

 

/* ================= TIMER ================= */

#screen{

  position:relative;

  z-index:5;

  display:flex;

  justify-content:center;

  align-items:center;

  height:100%;

  flex-direction:column;

 

  transform:translateY(80px); /* ✅ BAJADO SIN DESCENTRAR */

}

 

#timer{

  font-size:520px;

  font-weight:900;

 

  text-shadow:

    0 0 10px #00ff88,

    0 0 20px #00cc66,

    0 0 40px #008c45;

}

 

.warning{

  color:#FFD700;

}

 

.danger{

  color:#ff3b3b;

  text-shadow:0 0 10px red;

}

 

.blink{

  animation:blink 1s infinite;

}

 

@keyframes blink{

  50%{opacity:0;}

}

 

/* ================= FINAL ================= */

#endMessage{

  display:none;

  margin-top:140px;

  text-align:center;

}

 

#endMessage h1{

  font-size:120px;

  color:#FFD700;

  text-shadow:0 0 20px gold;

}

 

#endMessage p{

  font-size:56px;

}

 

/* ================= INPUT ================= */

#manual{

  position:absolute;

  top:40px;

  width:100%;

  text-align:center;

  font-size:50px;

  display:none;

}

</style>

</head>

 

<body>

 

<!-- CAMPO -->

<div id="field">

  <img id="ball" src="./assets/ball.png">

</div>

 

<!-- LOGO -->

<img id="logo" src="./assets/logo.png">

 

<!-- BRAND -->

<div id="brandBlock">

  <div id="poweredMini">Powered by</div>

  <div id="brandTop">Multimedia MX</div>

  <div id="brandBottom">IT Infrastructure Mex</div>

</div>

 

<!-- TIMER -->

<div id="screen">

  <div id="timer">00:00</div>

 

  <div id="endMessage">

    <h1>TIME’S UP ⏱⚽</h1>

    <p>Por favor, concluye tu participación</p>

  </div>

</div>

 

<div id="manual">

  Ajustando tiempo: <span id="manualValue">0</span> minutos

</div>

 

<script>

var remaining=0;

var running=false;

var interval=null;

var endTimestamp=0;

 

var mode="IDLE";

var manualBuffer="";

var inputTimeout=null;

var INPUT_DELAY=2000;

 

function pad(n){return (n<10?"0":"")+n;}

 

function updateDisplay(){

  var t=document.getElementById("timer");

 

  t.textContent =

    pad(Math.floor(remaining/60))+":"+pad(remaining%60);

 

  t.className="";

 

  if(mode!=="IDLE"){

    if(remaining<=60 && remaining>10){

      t.className="warning";

    }

    if(remaining<=10){

      t.className="danger blink";

    }

  }

}

 

function tick(){

  if(!running) return;

 

  remaining=Math.max(0,

    Math.ceil((endTimestamp-Date.now())/1000)

  );

 

  updateDisplay();

 

  if(remaining<=0){

    stopTimer();

    showEndInline();

  }

}

 

function startTimer(){

  if(remaining<=0) return;

 

  running=true;

  mode="RUNNING";

  endTimestamp=Date.now()+remaining*1000;

 

  interval=setInterval(tick,250);

}

 

function stopTimer(){

  running=false;

  if(interval){clearInterval(interval);}

}

 

function showEndInline(){

  if(mode==="END") return;

  mode="END";

  document.getElementById("endMessage").style.display="block";

}

 

function startInput(digit){

  if(mode!=="INPUT"){

    mode="INPUT";

    manualBuffer="";

    document.getElementById("manual").style.display="block";

    document.getElementById("endMessage").style.display="none";

  }

 

  manualBuffer+=digit;

  document.getElementById("manualValue").textContent=manualBuffer;

 

  if(inputTimeout) clearTimeout(inputTimeout);

 

  inputTimeout=setTimeout(()=>{

    remaining=parseInt(manualBuffer)*60;

    document.getElementById("manual").style.display="none";

    startTimer();

  },INPUT_DELAY);

}

 

function resetAll(){

  if(inputTimeout) clearTimeout(inputTimeout);

 

  stopTimer();

 

  remaining=0;

  manualBuffer="";

  mode="IDLE";

 

  document.getElementById("manual").style.display="none";

  document.getElementById("endMessage").style.display="none";

 

  updateDisplay();

}

 

document.addEventListener("keydown",function(e){

 

  if(e.keyCode < 48 || e.keyCode > 57) return;

 

  var digit = String.fromCharCode(e.keyCode);

 

  if(digit==="9"){

    resetAll();

    return;

  }

 

  if(mode==="RUNNING"){

    if(digit==="0") resetAll();

    return;

  }

 

  if(mode==="END"){

    resetAll();

    return;

  }

 

  startInput(digit);

});

 

resetAll();

</script>

 

</body>

</html>
