<!DOCTYPE html>

<html>

<body style="background:black; color:lime; font-size:40px;">

 

<div id="out">Presiona teclas...</div>

 

<script>

window.onkeydown = function(e){

  document.getElementById("out").innerText =

    "keydown: " + e.keyCode;

};

 

window.onkeypress = function(e){

  document.getElementById("out").innerText =

    "keypress: " + e.keyCode;

};

 

window.onkeyup = function(e){

  document.getElementById("out").innerText =

    "keyup: " + e.keyCode;

};

</script>

 

</body>

</html>
