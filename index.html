<!DOCTYPE html>

<html lang="es">

 

<head>

<meta charset="utf-8">

<title>Confidence Timer PRO</title>

<meta name="viewport" content="width=1920,height=1080">

 

<style>

html,body{

  margin:0;

  width:100%;

  height:100%;

  background:black;

  color:white;

  font-family:Arial,Helvetica,sans-serif;

  overflow:hidden;

}

 

/* ================= LOGO (AJUSTADO PRO) ================= */

#logo{

  position:fixed;

  top:25px;

  left:60px;

  width:420px;

  opacity:0.75; /* 🔥 menos brillo */

  filter: brightness(0.85) contrast(0.9); /* 🔥 más integrado */

  z-index:10;

}

 

/* ================= BRAND BLOCK ================= */

#brandBlock{

  position:fixed;

  bottom:25px;

  right:60px;

  text-align:center;

  color:white;

  opacity:0.4; /* 🔥 balanceado con el logo */

  z-index:10;

}

 

/* Multimedia (arriba) */

#brandTop{

  font-size:30px;

  letter-spacing:1px;

  margin-bottom:6px;

}

 

/* Infrastructure (abajo) */

#brandBottom{

  font-size:34px;

  font-weight:600;

  letter-spacing:1px;

}

 

/* ================= TIMER ================= */

#screen{

  display:flex;

  justify-content:center;

  align-items:center;

  height:100%;

  flex-direction:column;

}

 

#timer{

  font-size:520px;

  font-weight:900;

}

 

.warning{color:orange;}

.danger{color:red;}

.blink{animation:blink 1s infinite;}

 

@keyframes blink{50%{opacity:0;}}

 

/* ================= MENSAJE FINAL ================= */

#endMessage{

  display:none;

  margin-top:40px;

  text-align:center;

}

 

#endMessage h1{

  font-size:120px;

  margin:0 0 20px;

  color:#ff3b3b;

  letter-spacing:2px;

}

 

#endMessage p{

  font-size:56px;

  color:#ffc2c2;

}

 

/* ================= INPUT ================= */

#manual{

  position:absolute;

  top:40px;

  width:100%;

  text-align:center;

  font-size:50px;

  opacity:.85;

  display:none;

}

</style>

</head>

 

<body>

 

<!-- ✅ LOGO -->

<img id="logo" src="assets/logo.png" alt="Logo">

 

<!-- ✅ BRAND BLOQUE CENTRADO -->

<div id="brandBlock">

  <div id="brandTop">Multimedia</div>

  <div id="brandBottom">IT Infrastructure Mex</div>

</div>

 

<div id="screen">

  <div id="timer">00:00</div>

 

  <div id="endMessage">

    <h1>TIME’S UP ⏰</h1>

    <p>Por favor, concluye tu participación</p>

  </div>

</div>

 

<div id="manual">

  Ajustando tiempo: <span id="manualValue">0</span> minutos<br>

  (Inicio automático)

</div>

 

<script>

var total=0, remaining=0;

var running=false, interval=null;

var endTimestamp=0;

 

var mode="IDLE";

var manualBuffer="";

var inputTimeout=null;

var INPUT_DELAY=2000;

 

function pad(n){return (n<10?"0":"")+n;}

 

function updateDisplay(){

  var t=document.getElementById("timer");

  t.textContent =

    pad(Math.floor(remaining/60))+":"+pad(remaining%60);

 

  t.className="";

  if(remaining<=60 && remaining>10){

    t.className="warning";

  }

  if(remaining<=10){

    t.className="danger blink";

  }

}

 

function tick(){

  if(!running) return;

 

  remaining=Math.max(

    0,

    Math.ceil((endTimestamp-Date.now())/1000)

  );

 

  updateDisplay();

 

  if(remaining<=0){

    stopTimer();

    showEndInline();

  }

}

 

function startTimer(){

  if(remaining<=0) return;

  running=true;

  mode="RUNNING";

  endTimestamp=Date.now()+remaining*1000;

  interval=setInterval(tick,250);

}

 

function stopTimer(){

  running=false;

  if(interval){clearInterval(interval);interval=null;}

}

 

function showEndInline(){

  if(mode==="END") return;

  mode="END";

  document.getElementById("endMessage").style.display="block";

}

 

function startInput(digit){

  if(mode!=="INPUT"){

    mode="INPUT";

    manualBuffer="";

    document.getElementById("manual").style.display="block";

    document.getElementById("endMessage").style.display="none";

  }

 

  manualBuffer+=digit;

  document.getElementById("manualValue").textContent=manualBuffer;

 

  if(inputTimeout) clearTimeout(inputTimeout);

  inputTimeout=setTimeout(confirmInputAuto,INPUT_DELAY);

}

 

function confirmInputAuto(){

  if(manualBuffer==="") return;

  total=parseInt(manualBuffer,10)*60;

  remaining=total;

  document.getElementById("manual").style.display="none";

  startTimer();

}

 

function resetAll(){

  if(inputTimeout) clearTimeout(inputTimeout);

  stopTimer();

  total=0; remaining=0;

  manualBuffer="";

  mode="IDLE";

  document.getElementById("manual").style.display="none";

  document.getElementById("endMessage").style.display="none";

  var t=document.getElementById("timer");

  t.className="";

  t.textContent="00:00";

}

 

document.addEventListener("keydown",function(e){

 

  if(e.keyCode<48 || e.keyCode>57) return;

  var digit=String.fromCharCode(e.keyCode);

 

  if(digit==="9"){

    resetAll();

    return;

  }

 

  if(mode==="RUNNING"){

    if(digit==="0") resetAll();

    return;

  }

 

  if(mode==="END"){

    resetAll();

    return;

  }

 

  startInput(digit);

});

 

resetAll();

</script>

 

</body>

</html>
