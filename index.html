<!DOCTYPE html>

<html lang="es">

 

<head>

<meta charset="utf-8">

<title>Timer v1 DEBUG</title>

 

<style>

html,body{

  margin:0;

  background:black;

  color:white;

  font-family:Arial;

  overflow:hidden;

}

 

/* DEBUG PANEL */

#debug{

  position:fixed;

  top:0;

  left:0;

  width:100%;

  background:black;

  color:cyan;

  font-size:22px;

  padding:10px;

  z-index:999;

  border-bottom:2px solid #00ffff;

}

 

/* VERSION TAG */

#version{

  position:fixed;

  bottom:5px;

  left:10px;

  color:gray;

  font-size:18px;

  opacity:0.5;

}

 

/* TIMER */

#screen{

  display:flex;

  justify-content:center;

  align-items:center;

  height:100vh;

  flex-direction:column;

}

 

#timer{

  font-size:200px;

  font-weight:900;

}

 

.warning{color:orange;}

.danger{color:red;}

.blink{animation:blink 1s infinite;}

 

@keyframes blink{50%{opacity:0;}}

 

#manual{

  position:absolute;

  top:120px;

  width:100%;

  text-align:center;

  font-size:40px;

  display:none;

}

</style>

</head>

 

<body>

 

<div id="debug">Esperando input...</div>

 

<div id="screen">

  <div id="timer">00:00</div>

</div>

 

<div id="manual">

  Input: <span id="manualValue"></span>

</div>

 

<div id="version">Confidence Timer PRO v1.0 DEBUG</div>

 

<script>

let mode="IDLE";

let buffer="";

let remaining=0;

let interval=null;

let inputTimeout=null;

 

function pad(n){ return (n<10?"0":"")+n; }

 

function updateDisplay(){

  let t=document.getElementById("timer");

 

  t.innerText =

    pad(Math.floor(remaining/60))+":"+pad(remaining%60);

 

  t.className="";

 

  if(mode!=="IDLE"){

    if(remaining<=60 && remaining>10){

      t.className="warning";

    }

    if(remaining<=10){

      t.className="danger blink";

    }

  }

}

 

function logDebug(text){

  document.getElementById("debug").innerHTML=text;

}

 

function startTimer(){

  if(remaining<=0) return;

 

  mode="RUNNING";

  clearInterval(interval);

 

  interval=setInterval(()=>{

    remaining--;

    updateDisplay();

 

    if(remaining<=0){

      clearInterval(interval);

      mode="END";

    }

  },1000);

}

 

function resetAll(){

  clearInterval(interval);

 

  mode="IDLE";

  buffer="";

  remaining=0;

 

  document.getElementById("manual").style.display="none";

  updateDisplay();

}

 

/* 🔥 EVENTO PRINCIPAL COMPATIBLE TV */

window.onkeydown = function(e){

 

  let code = e.keyCode;

  let digit=null;

 

  switch(code){

    case 96: digit="0"; break;

    case 97: digit="1"; break;

    case 98: digit="2"; break;

    case 99: digit="3"; break;

    case 100: digit="4"; break;

    case 101: digit="5"; break;

    case 102: digit="6"; break;

    case 103: digit="7"; break;

    case 104: digit="8"; break;

    case 105: digit="9"; break;

 

    case 48: digit="0"; break;

    case 49: digit="1"; break;

    case 50: digit="2"; break;

    case 51: digit="3"; break;

    case 52: digit="4"; break;

    case 53: digit="5"; break;

    case 54: digit="6"; break;

    case 55: digit="7"; break;

    case 56: digit="8"; break;

    case 57: digit="9"; break;

  }

 

  logDebug(

    "keyCode: " + code +

    " | digit: " + digit +

    " | mode: " + mode +

    " | buffer: " + buffer

  );

 

  if(digit===null) return;

 

  /* RESET */

  if(digit==="9"){

    resetAll();

    return;

  }

 

  if(mode==="RUNNING"){

    if(digit==="0") resetAll();

    return;

  }

 

  if(mode==="END"){

    resetAll();

    return;

  }

 

  /* INPUT */

  mode="INPUT";

  buffer += digit;

 

  document.getElementById("manual").style.display="block";

  document.getElementById("manualValue").innerText=buffer;

 

  clearTimeout(inputTimeout);

 

  inputTimeout=setTimeout(()=>{

    remaining = parseInt(buffer)*60;

    document.getElementById("manual").style.display="none";

    startTimer();

  },1500);

}

 

updateDisplay();

</script>

 

</body>

</html>
