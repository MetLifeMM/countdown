<!DOCTYPE html>

<html lang="es">

 

<head>

<meta charset="utf-8">

<title>Timer DEBUG</title>

 

<style>

html,body{

  margin:0;

  background:black;

  color:white;

  font-family:Arial;

}

 

/* DEBUG PANEL */

#debug{

  position:fixed;

  top:0;

  left:0;

  width:100%;

  background:black;

  color:cyan;

  font-size:24px;

  padding:10px;

  z-index:999;

}

 

/* TIMER */

#screen{

  display:flex;

  justify-content:center;

  align-items:center;

  height:100vh;

}

 

#timer{

  font-size:200px;

}

</style>

</head>

 

<body>

 

<div id="debug">Esperando input...</div>

 

<div id="screen">

  <div id="timer">00:00</div>

</div>

 

<script>

let mode="IDLE";

let manualBuffer="";

let remaining=0;

 

function log(msg){

  document.getElementById("debug").innerHTML = msg;

}

 

/* MAPEO NUMPAD DIRECTO */

function getDigit(code){

 

  switch(code){

    case 96:return "0";

    case 97:return "1";

    case 98:return "2";

    case 99:return "3";

    case 100:return "4";

    case 101:return "5";

    case 102:return "6";

    case 103:return "7";

    case 104:return "8";

    case 105:return "9";

 

    case 48:return "0";

    case 49:return "1";

    case 50:return "2";

    case 51:return "3";

    case 52:return "4";

    case 53:return "5";

    case 54:return "6";

    case 55:return "7";

    case 56:return "8";

    case 57:return "9";

  }

  return null;

}

 

/* EVENTO TECLADO */

document.addEventListener("keydown", function(e){

 

  let code = e.keyCode;

  let digit = getDigit(code);

 

  log(

    "keyCode: " + code +

    " | digit: " + digit +

    " | mode: " + mode +

    " | buffer: " + manualBuffer

  );

 

  if(digit === null) return;

 

  if(mode==="IDLE"){

    mode="INPUT";

    manualBuffer="";

  }

 

  manualBuffer += digit;

 

  log(

    "✅ DIGIT DETECTADO → " + digit +

    "<br>mode: " + mode +

    "<br>buffer: " + manualBuffer

  );

 

});

</script>

 

</body>

</html>
